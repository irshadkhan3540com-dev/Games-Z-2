      - name: "Step 6: Complete 3D Engine - Core Kotlin Source Files"
        run: |
          # â”€â”€ app/build.gradle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.zatomic.tradinggame'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.tradinggame'
                  minSdk 26
                  targetSdk 34
                  versionCode 10
                  versionName "10.0-3D-Ultimate"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          # â”€â”€ 1. CinematicWorldView.kt â€” Full 3D Isometric Engine â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/CinematicWorldView.kt
          package com.zatomic.tradinggame

          import android.content.Context
          import android.graphics.*
          import android.util.AttributeSet
          import android.view.MotionEvent
          import android.view.View
          import kotlin.math.*

          class CinematicWorldView(context: Context, attrs: AttributeSet? = null) : View(context, attrs) {

              // â”€â”€ Public state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              var floorCount = 1

              // â”€â”€ Rotation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private var rotationAngle = 30f
              private var prevX = 0f

              // â”€â”€ Frame counter (for time-based animations) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private var frame = 0L

              // â”€â”€ Stars: [xFrac, yFrac, size, twinkleSpeed] â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private val starData: Array<FloatArray> = Array(110) {
                  floatArrayOf(
                      Math.random().toFloat(),
                      Math.random().toFloat(),
                      (Math.random() * 2f + 0.4f).toFloat(),
                      (Math.random() * 3f + 0.8f).toFloat()
                  )
              }

              // â”€â”€ Clouds: [x, y, scale, speed] â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private val clouds = arrayOf(
                  floatArrayOf(-120f, 70f, 0.85f, 0.35f),
                  floatArrayOf(250f, 130f, 0.60f, 0.20f),
                  floatArrayOf(500f, 95f, 0.70f, 0.28f)
              )

              // â”€â”€ Waves â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private var wavePhase = 0f

              // â”€â”€ Fish animation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private var fishProgress = 0f
              private var fishActive = false
              private var lastFishTime = System.currentTimeMillis()

              // â”€â”€ Particles: [x, y, vx, vy, life, maxLife, colorInt] â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private val particles = mutableListOf<FloatArray>()

              // â”€â”€ Shared paint object â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private val paint = Paint(Paint.ANTI_ALIAS_FLAG)

              // â”€â”€ Isometric 3D projection â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              // wx = world X (left/right), wy = world Y (up), wz = world Z (depth)
              // baseY = screen Y of island ground origin
              private fun isoProject(wx: Float, wy: Float, wz: Float, cx: Float, baseY: Float): PointF {
                  val rad = Math.toRadians(rotationAngle.toDouble())
                  val sx = cx + ((wx * cos(rad) - wz * sin(rad)) * 0.78f).toFloat()
                  val sy = baseY - wy + ((wx * sin(rad) + wz * cos(rad)) * 0.38f).toFloat()
                  return PointF(sx, sy)
              }

              // â”€â”€ Build a closed Path from vararg PointF â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private fun makePath(vararg pts: PointF): Path = Path().apply {
                  moveTo(pts[0].x, pts[0].y)
                  for (i in 1 until pts.size) lineTo(pts[i].x, pts[i].y)
                  close()
              }

              // â”€â”€ Darken / brighten a color by a factor â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private fun scaleColor(color: Int, f: Float): Int {
                  val r = (Color.red(color) * f).toInt().coerceIn(0, 255)
                  val g = (Color.green(color) * f).toInt().coerceIn(0, 255)
                  val b = (Color.blue(color) * f).toInt().coerceIn(0, 255)
                  return Color.argb(255, r, g, b)
              }

              // â”€â”€ Draw one isometric tower floor box â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private fun drawFloor(canvas: Canvas, idx: Int, cx: Float, baseY: Float) {
                  val W = 82f          // half-width  (X axis)
                  val D = 82f          // half-depth  (Z axis)
                  val H = 50f          // floor height (Y axis)
                  val bot = idx * H
                  val top = bot + H

                  // 8 corners: T=top B=bottom  F=front(+Z) B2=back(-Z)  L=left(-X) R=right(+X)
                  val tfl = isoProject(-W, top, D, cx, baseY)
                  val tfr = isoProject(W, top, D, cx, baseY)
                  val tbl = isoProject(-W, top, -D, cx, baseY)
                  val tbr = isoProject(W, top, -D, cx, baseY)
                  val bfl = isoProject(-W, bot, D, cx, baseY)
                  val bfr = isoProject(W, bot, D, cx, baseY)
                  val bbl = isoProject(-W, bot, -D, cx, baseY)
                  val bbr = isoProject(W, bot, -D, cx, baseY)

                  // Color palette per floor
                  val palettes = arrayOf(
                      intArrayOf(0xFF00E5FF.toInt(), 0xFF006E88.toInt(), 0xFF009BB5.toInt()),
                      intArrayOf(0xFFFFD700.toInt(), 0xFF8B6F00.toInt(), 0xFFCCA800.toInt()),
                      intArrayOf(0xFF00E676.toInt(), 0xFF006634.toInt(), 0xFF009E50.toInt()),
                      intArrayOf(0xFFE91E63.toInt(), 0xFF88093E.toInt(), 0xFFBB1451.toInt()),
                      intArrayOf(0xFF7C4DFF.toInt(), 0xFF4215A0.toInt(), 0xFF6530D8.toInt()),
                      intArrayOf(0xFFFF6D00.toInt(), 0xFF993D00.toInt(), 0xFFCC5200.toInt()),
                      intArrayOf(0xFF76FF03.toInt(), 0xFF3E8500.toInt(), 0xFF5EC702.toInt()),
                      intArrayOf(0xFFFF4081.toInt(), 0xFF990040.toInt(), 0xFFCC2062.toInt())
                  )
                  val pal = palettes[idx % palettes.size]
                  val topC = pal[0]; val sideL = pal[1]; val sideR = pal[2]

                  val rad = Math.toRadians(rotationAngle.toDouble())
                  val sinA = sin(rad).toFloat()
                  val cosA = cos(rad).toFloat()

                  // â”€â”€ Paint helper â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  fun fillFace(path: Path, color: Int) {
                      paint.style = Paint.Style.FILL
                      paint.color = color
                      canvas.drawPath(path, paint)
                  }

                  // â”€â”€ Draw faces backâ†’front (painter's algorithm) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  // Back faces (low Z / low X depending on rotation)
                  if (cosA < 0.1f) {
                      // back-Z face visible
                      fillFace(makePath(tbl, tbr, bbr, bbl), scaleColor(sideL, 0.55f))
                  }
                  if (sinA < 0.1f) {
                      // back-X (left) face visible
                      fillFace(makePath(tbl, tfl, bfl, bbl), scaleColor(sideL, 0.65f))
                  }
                  // Front faces
                  if (cosA > -0.1f) {
                      // front-Z face
                      fillFace(makePath(tfl, tfr, bfr, bfl), sideR)
                  }
                  if (sinA > -0.1f) {
                      // right-X face
                      fillFace(makePath(tfr, tbr, bbr, bfr), scaleColor(sideR, 0.80f))
                  }

                  // â”€â”€ Top face (always on top, brightest) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  val topPath = makePath(tfl, tfr, tbr, tbl)
                  fillFace(topPath, topC)

                  // â”€â”€ Edge outline â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  paint.style = Paint.Style.STROKE
                  paint.strokeWidth = 1.2f
                  paint.color = 0x44000000.toInt()
                  canvas.drawPath(topPath, paint)
                  paint.style = Paint.Style.FILL

                  // â”€â”€ Glow ring on the topmost floor â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  if (idx == floorCount - 1) {
                      // Simulated glow: stacked semi-transparent strokes (no BlurMaskFilter needed)
                      for (gr in listOf(6f, 4f, 2f)) {
                          paint.style = Paint.Style.STROKE
                          paint.strokeWidth = gr
                          paint.color = Color.argb((30 * (8f - gr)).toInt(), Color.red(topC), Color.green(topC), Color.blue(topC))
                          canvas.drawPath(topPath, paint)
                      }
                      paint.style = Paint.Style.FILL
                  }

                  // â”€â”€ Window dots on front face â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  if (cosA > 0f) {
                      val winPaint = Paint(Paint.ANTI_ALIAS_FLAG).apply {
                          color = Color.argb(180, 255, 255, 200)
                          style = Paint.Style.FILL
                      }
                      val midFX = (tfl.x + tfr.x) / 2f
                      val midFY = ((tfl.y + bfl.y) / 2f + (tfr.y + bfr.y) / 2f) / 2f
                      canvas.drawCircle(midFX - 12f, midFY, 3f, winPaint)
                      canvas.drawCircle(midFX + 12f, midFY, 3f, winPaint)
                      canvas.drawRect(midFX - 6f, midFY + 8f, midFX + 6f, midFY + 16f, winPaint)
                  }
              }

              // â”€â”€ Touch: rotate island â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              override fun onTouchEvent(ev: MotionEvent): Boolean {
                  if (ev.action == MotionEvent.ACTION_MOVE) {
                      rotationAngle += (ev.x - prevX) * 0.65f
                  }
                  prevX = ev.x
                  return true
              }

              // â”€â”€ Main draw â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              override fun onDraw(canvas: Canvas) {
                  super.onDraw(canvas)
                  frame++
                  val W = width.toFloat()
                  val H = height.toFloat()
                  val cx = W / 2f
                  val groundY = H * 0.62f
                  val t = frame * 0.016f    // ~seconds at 60fps

                  // â”€â”€ SKY GRADIENT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  paint.shader = LinearGradient(0f, 0f, 0f, groundY,
                      0xFF010C20.toInt(), 0xFF0C2044.toInt(), Shader.TileMode.CLAMP)
                  paint.style = Paint.Style.FILL
                  canvas.drawRect(0f, 0f, W, groundY, paint)
                  paint.shader = null

                  // â”€â”€ AURORA BOREALIS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  for (i in 0..4) {
                      val aPath = Path()
                      val baseOff = 28f + i * 22f
                      aPath.moveTo(0f, baseOff + sin((t * 0.3 + i * 0.9).toDouble()).toFloat() * 14f)
                      var ax = 0f
                      while (ax <= W) {
                          val ay = baseOff + sin((t * 0.4 + i.toDouble() + ax * 0.009).toDouble()).toFloat() * 18f
                          aPath.lineTo(ax, ay)
                          ax += 18f
                      }
                      aPath.lineTo(W, 0f); aPath.lineTo(0f, 0f); aPath.close()
                      val aa = 12 + i * 6
                      paint.color = if (i % 2 == 0) Color.argb(aa, 0, 220, 255)
                                    else Color.argb(aa, 0, 200, 120)
                      canvas.drawPath(aPath, paint)
                  }

                  // â”€â”€ STARS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  for (s in starData) {
                      val twinkle = ((sin((t * s[3] + s[0] * 12f).toDouble()) + 1.0) / 2.0).toFloat()
                      paint.color = Color.argb((100 + (140 * twinkle).toInt()), 255, 255, 255)
                      val r = s[2] * twinkle + 0.3f
                      canvas.drawCircle(s[0] * W, s[1] * groundY * 0.88f, r, paint)
                  }

                  // â”€â”€ MOVING CLOUDS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  for (c in clouds) {
                      c[0] += c[3]
                      if (c[0] > W + 260f) c[0] = -260f
                      drawCloud(canvas, c[0], c[1], c[2])
                  }

                  // â”€â”€ ANIMATED OCEAN WAVES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  wavePhase += 2.8f
                  val wavePath = Path()
                  wavePath.moveTo(0f, groundY)
                  var wx2 = 0f
                  while (wx2 <= W) {
                      val wy = groundY +
                          sin(((wx2 + wavePhase) * 0.030f).toDouble()).toFloat() * 9f +
                          sin(((wx2 + wavePhase * 1.6f) * 0.055f).toDouble()).toFloat() * 4f
                      wavePath.lineTo(wx2, wy)
                      wx2 += 5f
                  }
                  wavePath.lineTo(W, H); wavePath.lineTo(0f, H); wavePath.close()
                  paint.shader = LinearGradient(0f, groundY, 0f, H,
                      0xFF0E4B99.toInt(), 0xFF041630.toInt(), Shader.TileMode.CLAMP)
                  canvas.drawPath(wavePath, paint)
                  paint.shader = null

                  // Ocean shimmer highlights
                  for (i in 0..6) {
                      val sx = cx - 220f + i * 75f + sin((t * 1.3 + i).toDouble()).toFloat() * 28f
                      val sy = groundY + 18f + i * 14f
                      val sa = (160 * abs(sin((t * 2.0 + i).toDouble()))).toInt()
                      paint.color = Color.argb(sa, 180, 220, 255)
                      canvas.drawCircle(sx, sy, 2.5f, paint)
                  }

                  // â”€â”€ 3D ISLAND BASE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  val iY = groundY - 6f; val iRx = 290f; val iRy = 72f
                  // Drop shadow
                  paint.color = 0x55000000.toInt()
                  canvas.drawOval(cx - iRx + 14f, iY - iRy / 2f + 22f,
                      cx + iRx + 14f, iY + iRy / 2f + 22f, paint)
                  // Side cliff (depth illusion)
                  paint.color = 0xFF1A5920.toInt()
                  canvas.drawOval(cx - iRx, iY - iRy / 2f + 14f, cx + iRx, iY + iRy / 2f + 16f, paint)
                  // Grass top with radial gradient
                  paint.shader = RadialGradient(cx - 60f, iY - 12f, iRx * 0.75f,
                      0xFF70C74F.toInt(), 0xFF2A6E22.toInt(), Shader.TileMode.CLAMP)
                  canvas.drawOval(cx - iRx, iY - iRy, cx + iRx, iY, paint)
                  paint.shader = null
                  // Grass arc detail lines
                  paint.style = Paint.Style.STROKE; paint.strokeWidth = 1.5f
                  paint.color = 0x2255AA44.toInt()
                  for (i in -4..4) {
                      val shrink = abs(i) * 28f
                      canvas.drawArc(
                          cx - iRx + shrink, iY - iRy + abs(i) * 6f,
                          cx + iRx - shrink, iY,
                          190f, 160f, false, paint
                      )
                  }
                  paint.style = Paint.Style.FILL

                  // â”€â”€ 3D TOWER FLOORS (back to front) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  val towerBase = iY - 10f
                  for (i in 0 until floorCount) {
                      drawFloor(canvas, i, cx, towerBase)
                  }

                  // Tower top beacon beam
                  val beaconY = towerBase - floorCount * 50f - 35f
                  paint.shader = LinearGradient(cx - 4f, beaconY - 90f, cx + 4f, beaconY,
                      0xBBFFFFFF.toInt(), 0x0000FFFF.toInt(), Shader.TileMode.CLAMP)
                  canvas.drawRect(cx - 4f, beaconY - 90f, cx + 4f, beaconY, paint)
                  paint.shader = null

                  // Beacon orb glow (layered circles, no BlurMaskFilter required)
                  val pulseAlpha = ((sin((t * 4.0).toDouble()) + 1.0) / 2.0 * 200.0 + 55.0).toInt()
                  for (r in listOf(22f, 16f, 10f, 5f)) {
                      val a = (pulseAlpha * (1f - r / 24f)).toInt()
                      paint.color = Color.argb(a, 0, 229, 255)
                      canvas.drawCircle(cx, beaconY - 90f, r, paint)
                  }

                  // â”€â”€ PARTICLE SPARKS FROM TOWER TOP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  if (particles.size < 30 && frame % 4L == 0L) {
                      val particleColors = intArrayOf(
                          0xFFFFD700.toInt(), 0xFF00E5FF.toInt(),
                          0xFF00E676.toInt(), 0xFFE91E63.toInt(), 0xFFA020F0.toInt()
                      )
                      val c2 = particleColors[(Math.random() * particleColors.size).toInt()]
                      particles.add(floatArrayOf(
                          cx + (Math.random() * 28f - 14f).toFloat(),
                          beaconY - 85f,
                          (Math.random() * 2.2f - 1.1f).toFloat(),
                          (-Math.random() * 3f - 0.5f).toFloat(),
                          0f,
                          45f + (Math.random() * 35f).toFloat(),
                          c2.toFloat()
                      ))
                  }
                  val pIter = particles.iterator()
                  while (pIter.hasNext()) {
                      val pp = pIter.next()
                      pp[0] += pp[2]; pp[1] += pp[3]
                      pp[3] += 0.06f   // gravity
                      pp[4] += 1f
                      if (pp[4] >= pp[5]) { pIter.remove(); continue }
                      val lifeRatio = 1f - pp[4] / pp[5]
                      val alpha = (255 * lifeRatio).toInt()
                      val pSize = 4.5f * lifeRatio + 0.5f
                      paint.color = pp[6].toInt(); paint.alpha = alpha
                      canvas.drawCircle(pp[0], pp[1], pSize, paint)
                      paint.alpha = 255
                  }

                  // â”€â”€ FISH JUMP ANIMATION (every 15 seconds) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  val now = System.currentTimeMillis()
                  if (!fishActive && now - lastFishTime > 15_000L) {
                      fishActive = true; fishProgress = 0f
                  }
                  if (fishActive) {
                      fishProgress += 1.6f
                      if (fishProgress >= 100f) {
                          fishActive = false; lastFishTime = System.currentTimeMillis()
                      } else {
                          val norm = fishProgress / 100f
                          val fishX = norm * (W + 220f) - 110f
                          val peakY = beaconY - 55f
                          val fishY = groundY - sin((norm * Math.PI).toDouble()).toFloat() * (groundY - peakY)

                          // Shadow on water surface
                          val shadowSize = 20f * sin((norm * Math.PI).toDouble()).toFloat()
                          paint.color = 0x55000000.toInt()
                          canvas.drawOval(fishX - shadowSize, groundY - 5f,
                              fishX + shadowSize, groundY + 5f, paint)

                          // Sparkle trail (3 fading dots behind fish)
                          for (tr in 1..4) {
                              val tn = (fishProgress - tr * 4f) / 100f
                              if (tn > 0f) {
                                  val tx = tn * (W + 220f) - 110f
                                  val ty = groundY - sin((tn * Math.PI).toDouble()).toFloat() * (groundY - peakY)
                                  paint.color = Color.argb(220 - tr * 50, 255, 200, 80)
                                  canvas.drawCircle(tx, ty, 7f - tr * 1.5f, paint)
                              }
                          }

                          // Fish body
                          paint.color = 0xFFFF9800.toInt()
                          canvas.drawOval(fishX - 30f, fishY - 14f, fishX + 30f, fishY + 14f, paint)

                          // Dorsal fin
                          paint.color = 0xFFE65100.toInt()
                          val fin = Path().apply {
                              moveTo(fishX - 5f, fishY - 14f)
                              lineTo(fishX + 2f, fishY - 28f)
                              lineTo(fishX + 14f, fishY - 14f)
                              close()
                          }
                          canvas.drawPath(fin, paint)

                          // Tail
                          val tail = Path().apply {
                              moveTo(fishX - 24f, fishY)
                              lineTo(fishX - 50f, fishY - 22f)
                              lineTo(fishX - 50f, fishY + 22f)
                              close()
                          }
                          canvas.drawPath(tail, paint)

                          // Eye white + pupil
                          paint.color = 0xFFFFFFFF.toInt()
                          canvas.drawCircle(fishX + 16f, fishY - 4f, 5.5f, paint)
                          paint.color = 0xFF111111.toInt()
                          canvas.drawCircle(fishX + 17.5f, fishY - 4f, 2.8f, paint)
                          // Eye shine
                          paint.color = 0xCCFFFFFF.toInt()
                          canvas.drawCircle(fishX + 18.5f, fishY - 6f, 1.3f, paint)
                      }
                  }

                  invalidate()   // continuous animation
              }

              // â”€â”€ Helper: draw a fluffy cloud â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private fun drawCloud(canvas: Canvas, x: Float, y: Float, s: Float) {
                  paint.color = Color.argb((65 * s).toInt(), 210, 230, 255)
                  canvas.drawCircle(x, y, 40f * s, paint)
                  canvas.drawCircle(x + 34f * s, y + 9f * s, 29f * s, paint)
                  canvas.drawCircle(x - 29f * s, y + 10f * s, 24f * s, paint)
                  canvas.drawCircle(x + 9f * s, y - 16f * s, 27f * s, paint)
              }
          }
