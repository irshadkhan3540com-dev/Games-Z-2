      - name: "Step 6: Complete 3D Engine - Core Kotlin Source Files"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.zatomic.tradinggame'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.tradinggame'
                  minSdk 26
                  targetSdk 34
                  versionCode 10
                  versionName "10.0-3D-Ultimate"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          # 1. CinematicWorldView.kt
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/CinematicWorldView.kt
          package com.zatomic.tradinggame

          import android.content.Context
          import android.graphics.*
          import android.util.AttributeSet
          import android.view.MotionEvent
          import android.view.View
          import kotlin.math.*

          class CinematicWorldView(context: Context, attrs: AttributeSet? = null) : View(context, attrs) {
              var floorCount = 1
              private var rotationAngle = 30f
              private var prevX = 0f
              private var frame = 0L

              data class FloatingText(val msg: String, var x: Float, var y: Float, var alpha: Float)
              private val floaters = mutableListOf<FloatingText>()

              fun showFloatingText(text: String) {
                  floaters.add(FloatingText(text, width / 2f - 80f, height / 2f + 50f, 255f))
              }

              private var whaleProgress = 0f
              private var isWhaleFlying = false
              private var lastWhaleTime = System.currentTimeMillis()

              private val paint = Paint(Paint.ANTI_ALIAS_FLAG)

              private fun isoProject(wx: Float, wy: Float, wz: Float, cx: Float, baseY: Float): PointF {
                  val rad = Math.toRadians(rotationAngle.toDouble())
                  val sx = cx + ((wx * cos(rad) - wz * sin(rad)) * 0.78f).toFloat()
                  val sy = baseY - wy + ((wx * sin(rad) + wz * cos(rad)) * 0.38f).toFloat()
                  return PointF(sx, sy)
              }

              private fun makePath(vararg pts: PointF): Path = Path().apply {
                  moveTo(pts[0].x, pts[0].y)
                  for (i in 1 until pts.size) lineTo(pts[i].x, pts[i].y)
                  close()
              }

              private fun drawFloor(canvas: Canvas, idx: Int, cx: Float, baseY: Float) {
                  val W = 82f
                  val D = 82f
                  val H = 50f
                  val bot = idx * H
                  val top = bot + H

                  val tfl = isoProject(-W, top, D, cx, baseY)
                  val tfr = isoProject(W, top, D, cx, baseY)
                  val tbl = isoProject(-W, top, -D, cx, baseY)
                  val tbr = isoProject(W, top, -D, cx, baseY)
                  val bfl = isoProject(-W, bot, D, cx, baseY)
                  val bfr = isoProject(W, bot, D, cx, baseY)
                  val bbl = isoProject(-W, bot, -D, cx, baseY)
                  val bbr = isoProject(W, bot, -D, cx, baseY)

                  val topC = 0xFF2B3A4A.toInt()
                  val sideL = 0xFF1C2836.toInt()
                  val sideR = 0xFF354A5F.toInt()

                  val rad = Math.toRadians(rotationAngle.toDouble())
                  val sinA = sin(rad).toFloat()
                  val cosA = cos(rad).toFloat()

                  fun fillFace(path: Path, color: Int) {
                      paint.style = Paint.Style.FILL
                      paint.color = color
                      canvas.drawPath(path, paint)
                  }

                  if (cosA < 0.1f) fillFace(makePath(tbl, tbr, bbr, bbl), sideL)
                  if (sinA < 0.1f) fillFace(makePath(tbl, tfl, bfl, bbl), sideL)

                  paint.strokeWidth = 2f
                  if (cosA > -0.1f) {
                      fillFace(makePath(tfl, tfr, bfr, bfl), sideR)
                      paint.style = Paint.Style.STROKE
                      paint.color = Color.parseColor("#4488DDFF")
                      canvas.drawLine(tfl.x, (tfl.y+bfl.y)/2, tfr.x, (tfr.y+bfr.y)/2, paint)
                      canvas.drawLine((tfl.x+tfr.x)/2, (tfl.y+tfr.y)/2, (bfl.x+bfr.x)/2, (bfl.y+bfr.y)/2, paint)
                      paint.style = Paint.Style.FILL
                  }
                  if (sinA > -0.1f) {
                      fillFace(makePath(tfr, tbr, bbr, bfr), sideL)
                      paint.style = Paint.Style.STROKE
                      paint.color = Color.parseColor("#2288DDFF")
                      canvas.drawLine(tfr.x, (tfr.y+bfr.y)/2, tbr.x, (tbr.y+bbr.y)/2, paint)
                      canvas.drawLine((tfr.x+tbr.x)/2, (tfr.y+tbr.y)/2, (bfr.x+bfr.x)/2, (bfr.y+bfr.y)/2, paint)
                      paint.style = Paint.Style.FILL
                  }

                  val topPath = makePath(tfl, tfr, tbr, tbl)
                  fillFace(topPath, topC)
                  paint.style = Paint.Style.STROKE
                  paint.color = 0x44000000.toInt()
                  canvas.drawPath(topPath, paint)
                  paint.style = Paint.Style.FILL

                  if (idx == floorCount - 1) {
                      paint.color = Color.GRAY
                      paint.strokeWidth = 4f
                      val midX = (tfl.x + tfr.x + tbr.x + tbl.x)/4
                      val midY = (tfl.y + tfr.y + tbr.y + tbl.y)/4
                      canvas.drawLine(midX, midY, midX, midY - 60f, paint)
                      
                      paint.style = Paint.Style.FILL
                      paint.color = if (frame % 40 < 20) Color.RED else Color.DKGRAY
                      canvas.drawCircle(midX, midY - 60f, 6f, paint)
                  }
              }

              override fun onTouchEvent(ev: MotionEvent): Boolean {
                  if (ev.action == MotionEvent.ACTION_MOVE) rotationAngle += (ev.x - prevX) * 0.65f
                  prevX = ev.x
                  return true
              }

              override fun onDraw(canvas: Canvas) {
                  super.onDraw(canvas)
                  frame++
                  val W = width.toFloat()
                  val H = height.toFloat()
                  val cx = W / 2f
                  val groundY = H * 0.62f

                  paint.shader = LinearGradient(0f, 0f, 0f, groundY, 0xFF010C20.toInt(), 0xFF0C2044.toInt(), Shader.TileMode.CLAMP)
                  canvas.drawRect(0f, 0f, W, groundY, paint)
                  paint.shader = LinearGradient(0f, groundY, 0f, H, 0xFF0E4B99.toInt(), 0xFF041630.toInt(), Shader.TileMode.CLAMP)
                  canvas.drawRect(0f, groundY, W, H, paint)
                  paint.shader = null

                  val iY = groundY - 6f; val iRx = 290f; val iRy = 72f
                  paint.color = 0xFF1A5920.toInt()
                  canvas.drawOval(cx - iRx, iY - iRy / 2f + 14f, cx + iRx, iY + iRy / 2f + 16f, paint)
                  paint.color = 0xFF2A6E22.toInt()
                  canvas.drawOval(cx - iRx, iY - iRy, cx + iRx, iY, paint)

                  val now = System.currentTimeMillis()
                  if (!isWhaleFlying && now - lastWhaleTime > 15_000L) {
                      isWhaleFlying = true
                      whaleProgress = 0f
                  }
                  if (isWhaleFlying) {
                      whaleProgress += 1.0f
                      if (whaleProgress >= 100f) {
                          isWhaleFlying = false
                          lastWhaleTime = System.currentTimeMillis()
                      } else {
                          val norm = whaleProgress / 100f
                          val whaleX = norm * (W + 400f) - 200f
                          val peakY = groundY - 300f
                          val whaleY = groundY - sin((norm * Math.PI).toDouble()).toFloat() * (groundY - peakY)

                          paint.color = Color.parseColor("#1C2A39")
                          canvas.drawOval(whaleX - 80f, whaleY - 35f, whaleX + 80f, whaleY + 35f, paint)
                          paint.color = Color.parseColor("#A0B0C0")
                          canvas.drawOval(whaleX - 50f, whaleY + 5f, whaleX + 70f, whaleY + 30f, paint)
                          paint.color = Color.parseColor("#1C2A39")
                          val tail = Path().apply {
                              moveTo(whaleX - 60f, whaleY)
                              lineTo(whaleX - 110f, whaleY - 50f)
                              lineTo(whaleX - 110f, whaleY + 50f)
                              close()
                          }
                          canvas.drawPath(tail, paint)
                          paint.color = Color.WHITE
                          canvas.drawCircle(whaleX + 40f, whaleY - 10f, 6f, paint)
                          
                          if(norm < 0.15f || norm > 0.85f) {
                              paint.color = Color.argb(150, 200, 230, 255)
                              val splashR = 50f * if(norm < 0.15f) norm/0.15f else (1f-norm)/0.15f
                              canvas.drawCircle(whaleX, groundY, splashR, paint)
                              canvas.drawCircle(whaleX - 30f, groundY + 10f, splashR * 0.7f, paint)
                              canvas.drawCircle(whaleX + 30f, groundY + 10f, splashR * 0.7f, paint)
                          }
                      }
                  }

                  val towerBase = iY - 10f
                  for (i in 0 until floorCount) {
                      drawFloor(canvas, i, cx, towerBase)
                  }

                  paint.textSize = 65f
                  paint.typeface = Typeface.DEFAULT_BOLD
                  paint.color = Color.GREEN
                  val it = floaters.iterator()
                  while(it.hasNext()) {
                      val f = it.next()
                      f.y -= 2.5f
                      f.alpha -= 3f
                      if (f.alpha <= 0f) { it.remove(); continue }
                      paint.alpha = f.alpha.toInt()
                      paint.setShadowLayer(4f, 0f, 0f, Color.BLACK)
                      canvas.drawText(f.msg, f.x, f.y, paint)
                      paint.clearShadowLayer()
                  }
                  paint.alpha = 255

                  invalidate()
              }
          }
          EOF

          # 2. CustomGraphView.kt
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/CustomGraphView.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.graphics.*
          import android.util.AttributeSet
          import android.view.View

          class CustomGraphView(context: Context, attrs: AttributeSet? = null) : View(context, attrs) {
              data class Candle(val open: Float, val close: Float, val high: Float, val low: Float)
              private val candles = mutableListOf<Candle>()
              private val paintGrid = Paint().apply { color = 0x15FFFFFF.toInt(); strokeWidth = 0.8f; isAntiAlias = true }
              private val paintGreen = Paint().apply { color = 0xFF00E676.toInt(); style = Paint.Style.FILL; isAntiAlias = true }
              private val paintRed = Paint().apply { color = 0xFFFF1744.toInt(); style = Paint.Style.FILL; isAntiAlias = true }
              private val paintWick = Paint().apply { strokeWidth = 2.2f; isAntiAlias = true }

              fun addCandle(open: Float, close: Float, high: Float, low: Float) {
                  if (candles.size > 32) candles.removeAt(0)
                  candles.add(Candle(open, close, high, low))
                  invalidate()
              }

              override fun onDraw(canvas: Canvas) {
                  super.onDraw(canvas)
                  if (candles.isEmpty()) return
                  val W = width.toFloat(); val H = height.toFloat()
                  for (i in 1..5) { canvas.drawLine(0f, H*i/6f, W, H*i/6f, paintGrid); canvas.drawLine(W*i/6f, 0f, W*i/6f, H, paintGrid) }
                  
                  val maxP = candles.maxOf { it.high } + 1f
                  val minP = candles.minOf { it.low } - 1f
                  val range = if (maxP == minP) 1f else maxP - minP
                  val spacing = W / (candles.size + 1f)
                  val candleW = (spacing * 0.55f).coerceAtLeast(4f)

                  for (i in candles.indices) {
                      val c = candles[i]; val cx = (i + 1f) * spacing
                      fun toScreenY(price: Float) = H - ((price - minP) / range) * H
                      val openY = toScreenY(c.open); val closeY = toScreenY(c.close)
                      val highY = toScreenY(c.high); val lowY = toScreenY(c.low)

                      val isGreen = c.close >= c.open
                      val pBody = if (isGreen) paintGreen else paintRed
                      paintWick.color = if (isGreen) 0xFF00E676.toInt() else 0xFFFF1744.toInt()
                      
                      canvas.drawLine(cx, highY, cx, minOf(openY, closeY), paintWick)
                      canvas.drawLine(cx, maxOf(openY, closeY), cx, lowY, paintWick)
                      canvas.drawRoundRect(cx - candleW/2f, minOf(openY, closeY), cx + candleW/2f, maxOf(openY, closeY).coerceAtLeast(minOf(openY, closeY)+2f), 3f, 3f, pBody)
                  }
              }
          }
          EOF

          # 3. MainActivity.kt
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/MainActivity.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.content.Intent
          import android.os.Bundle
          import android.widget.Button
          import android.widget.ImageView
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*

          class MainActivity : AppCompatActivity() {
              private lateinit var tvWallet: TextView
              private lateinit var tvTowerFloor: TextView
              private lateinit var worldView: CinematicWorldView
              private var balance = 10000
              private var towerFloor = 1
              private var incomeJob: Job? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  tvWallet = findViewById(R.id.tvWallet)
                  tvTowerFloor = findViewById(R.id.tvTowerFloor)
                  worldView = findViewById(R.id.cinematicWorldView)

                  findViewById<ImageView>(R.id.btnOpenWalletSettings).setOnClickListener {
                      startActivity(Intent(this, WalletSettingsActivity::class.java))
                  }

                  findViewById<Button>(R.id.btnUpgradeTower).setOnClickListener {
                      val cost = towerFloor * 500
                      if (balance < cost) {
                          Toast.makeText(this, "Need Rs.$cost to build floor ${towerFloor + 1}!", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }
                      balance -= cost
                      towerFloor++
                      savePrefs()
                      syncUI()
                      Toast.makeText(this, "Floor $towerFloor constructed!", Toast.LENGTH_SHORT).show()
                  }

                  findViewById<Button>(R.id.btnOpenMarket).setOnClickListener {
                      startActivity(Intent(this, TradingActivity::class.java))
                  }
              }

              override fun onResume() {
                  super.onResume()
                  loadPrefs()
                  syncUI()

                  incomeJob = CoroutineScope(Dispatchers.Main).launch {
                      while(true) {
                          delay(60_000)
                          val income = 50 * (1 shl (towerFloor - 1).coerceAtMost(20))
                          balance += income
                          savePrefs()
                          syncUI()
                          worldView.showFloatingText("+Rs.$income")
                      }
                  }
              }

              override fun onPause() {
                  super.onPause()
                  incomeJob?.cancel()
              }

              private fun loadPrefs() {
                  val p = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                  balance = p.getInt("wallet_balance", 10000)
                  towerFloor = p.getInt("tower_floor", 1)
              }

              private fun savePrefs() {
                  getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).edit()
                      .putInt("wallet_balance", balance)
                      .putInt("tower_floor", towerFloor).apply()
              }

              private fun syncUI() {
                  val nextCost = towerFloor * 500
                  tvWallet.text = "Balance: Rs.$balance"
                  tvTowerFloor.text = "Lv.$towerFloor"
                  findViewById<Button>(R.id.btnUpgradeTower).text = "Build Floor ${towerFloor + 1}  (Cost: Rs.$nextCost)"
                  worldView.floorCount = towerFloor
                  worldView.invalidate()
              }
          }
          EOF

          # 4. WalletSettingsActivity.kt
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/WalletSettingsActivity.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*

          class WalletSettingsActivity : AppCompatActivity() {
              private lateinit var tvBalance: TextView
              private var balance = 10000
              private var towerFloor = 1
              private var job: Job? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_wallet_settings)

                  tvBalance = findViewById(R.id.tvCurrentBalance)
                  val prefs = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                  balance = prefs.getInt("wallet_balance", 10000)
                  towerFloor = prefs.getInt("tower_floor", 1)
                  tvBalance.text = "Funds: Rs.$balance"

                  setupBtn(R.id.btnClaim1m,  "t_1m",  60L,    1000)
                  setupBtn(R.id.btnClaim10m, "t_10m", 600L,   2000)
                  setupBtn(R.id.btnClaim30m, "t_30m", 1800L,  5000)
                  setupBtn(R.id.btnClaim1h,  "t_1h",  3600L,  10000)

                  findViewById<Button>(R.id.btnBackToHome).setOnClickListener { finish() }

                  job = CoroutineScope(Dispatchers.Main).launch {
                      while (true) {
                          val now = System.currentTimeMillis()
                          updateLabel("t_1m",  now, R.id.tvTimer1m,  R.id.btnClaim1m,  "1 Minute",  1000)
                          updateLabel("t_10m", now, R.id.tvTimer10m, R.id.btnClaim10m, "10 Minute", 2000)
                          updateLabel("t_30m", now, R.id.tvTimer30m, R.id.btnClaim30m, "30 Minute", 5000)
                          updateLabel("t_1h",  now, R.id.tvTimer1h,  R.id.btnClaim1h,  "1 Hour",    10000)
                          
                          findViewById<TextView>(R.id.tvMahaulText).text = "Mahaul: Level $towerFloor Island Tower - All Systems Fast & Secure"
                          delay(1000)
                      }
                  }
              }

              private fun setupBtn(btnId: Int, key: String, secs: Long, prize: Int) {
                  findViewById<Button>(btnId).setOnClickListener {
                      val prefs = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                      val target = prefs.getLong(key, 0L)
                      val now = System.currentTimeMillis()
                      when {
                          target == 0L -> {
                              prefs.edit().putLong(key, now + secs * 1000L).apply()
                              Toast.makeText(this, "Timer started!", Toast.LENGTH_SHORT).show()
                          }
                          now >= target -> {
                              balance += prize
                              prefs.edit().putLong(key, 0L).putInt("wallet_balance", balance).apply()
                              tvBalance.text = "Funds: Rs.$balance"
                              Toast.makeText(this, "Claimed Rs.$prize!", Toast.LENGTH_SHORT).show()
                          }
                          else -> Toast.makeText(this, "Timer still running!", Toast.LENGTH_SHORT).show()
                      }
                  }
              }

              private fun updateLabel(key: String, now: Long, tvId: Int, btnId: Int, name: String, prize: Int) {
                  val target = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).getLong(key, 0L)
                  val tv = findViewById<TextView>(tvId)
                  val btn = findViewById<Button>(btnId)
                  when {
                      target == 0L  -> { tv.text = "$name Bonus: Ready"; btn.text = "Start Timer (Get Rs.$prize)" }
                      now >= target -> { tv.text = "$name Bonus: Done!";  btn.text = "Claim Rs.$prize NOW!" }
                      else -> {
                          val diff = (target - now) / 1000L
                          tv.text = String.format("%s: %02d:%02d:%02d left", name, diff / 3600, (diff % 3600) / 60, diff % 60)
                          btn.text = "LOCKED"
                      }
                  }
              }
              override fun onDestroy() { super.onDestroy(); job?.cancel() }
          }
          EOF

          # 5. TradingActivity.kt
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/TradingActivity.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.graphics.Color
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*
          import java.util.Random

          class TradingActivity : AppCompatActivity() {
              private var bal = 10000; private var bet = 10; private var isTrade = false
              private var currentPrice = 514.85f; private var openPrice = 514.85f
              private lateinit var tvBal: TextView; private lateinit var tvP: TextView; private lateinit var tvT: TextView
              private lateinit var g: CustomGraphView; private var job: Job? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_trading)
                  tvBal = findViewById(R.id.tvTradingWallet); tvP = findViewById(R.id.tvLivePrice)
                  tvT = findViewById(R.id.tvCountdown); g = findViewById(R.id.customGraphView)
                  
                  bal = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).getInt("wallet_balance", 10000)
                  tvBal.text = "Wallet: Rs.$bal"

                  listOf(Pair(R.id.btnAmt10, 10), Pair(R.id.btnAmt50, 50), Pair(R.id.btnAmt100, 100), Pair(R.id.btnAmt500, 500)).forEach { (id, amount) ->
                      findViewById<Button>(id).setOnClickListener { bet = amount }
                  }

                  job = CoroutineScope(Dispatchers.Main).launch {
                      while(true) {
                          val change = (Random().nextFloat() * 8f) - 4f
                          val closeP = (openPrice + change).coerceAtLeast(10f)
                          val highP = maxOf(openPrice, closeP) + Random().nextFloat() * 2.5f
                          val lowP = minOf(openPrice, closeP) - Random().nextFloat() * 2.5f
                          currentPrice = closeP; tvP.text = String.format("Rs.%.2f", currentPrice)
                          tvP.setTextColor(if(closeP >= openPrice) Color.GREEN else Color.RED)
                          g.addCandle(openPrice, closeP, highP, lowP)
                          openPrice = closeP; delay(1400)
                      }
                  }

                  findViewById<Button>(R.id.btnUp).setOnClickListener { trade("UP") }
                  findViewById<Button>(R.id.btnDown).setOnClickListener { trade("DOWN") }
              }

              private fun trade(type: String) {
                  if (isTrade || bal < bet) return
                  bal -= bet; tvBal.text = "Wallet: Rs.$bal"; isTrade = true; val sp = currentPrice
                  CoroutineScope(Dispatchers.Main).launch {
                      for(i in 5 downTo 1) { tvT.text = "Expiry: ${i}s"; delay(1000) }
                      if((type=="UP" && currentPrice>sp) || (type=="DOWN" && currentPrice<sp)) { 
                          bal += bet*2; Toast.makeText(this@TradingActivity, "PROFIT WIN!", Toast.LENGTH_SHORT).show() 
                      } else { Toast.makeText(this@TradingActivity, "LOSS!", Toast.LENGTH_SHORT).show() }
                      getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).edit().putInt("wallet_balance", bal).apply()
                      tvBal.text = "Wallet: Rs.$bal"; isTrade = false; tvT.text = "Clock: Standby"
                  }
              }
              override fun onDestroy() { super.onDestroy(); job?.cancel() }
          }
          EOF

