          package com.zatomic.tradinggame

          import android.content.Context
          import android.graphics.*
          import android.util.AttributeSet
          import android.view.View

          class CustomGraphView(context: Context, attrs: AttributeSet? = null) : View(context, attrs) {

              data class Candle(val open: Float, val close: Float, val high: Float, val low: Float)

              private val candles = mutableListOf<Candle>()

              // â”€â”€ Real EMA calculation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private fun calcEMA(period: Int): List<Float> {
                  if (candles.size < period) return emptyList()
                  val k = 2f / (period + 1f)
                  var ema = candles.take(period).map { it.close }.average().toFloat()
                  val result = mutableListOf<Float>()
                  for (i in period until candles.size) {
                      ema = candles[i].close * k + ema * (1f - k)
                      result.add(ema)
                  }
                  return result
              }

              // â”€â”€ Paints â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
              private val paintGrid  = Paint().apply { color = 0x15FFFFFF.toInt(); strokeWidth = 0.8f; isAntiAlias = true }
              private val paintWickG = Paint().apply { color = 0xFF00E676.toInt(); strokeWidth = 2.2f; isAntiAlias = true }
              private val paintWickR = Paint().apply { color = 0xFFFF1744.toInt(); strokeWidth = 2.2f; isAntiAlias = true }
              private val paintEma21 = Paint().apply {
                  color = 0xFFFFC107.toInt(); strokeWidth = 2.5f
                  style = Paint.Style.STROKE; isAntiAlias = true
              }
              private val paintEma9  = Paint().apply {
                  color = 0xFF03A9F4.toInt(); strokeWidth = 2.5f
                  style = Paint.Style.STROKE; isAntiAlias = true
              }
              private val paintLabel = Paint().apply {
                  color = 0x88FFFFFF.toInt(); textSize = 21f; isAntiAlias = true
              }
              private val paintVol   = Paint().apply { style = Paint.Style.FILL; isAntiAlias = true }

              fun addCandle(open: Float, close: Float, high: Float, low: Float) {
                  if (candles.size > 32) candles.removeAt(0)
                  candles.add(Candle(open, close, high, low))
                  invalidate()
              }

              override fun onDraw(canvas: Canvas) {
                  super.onDraw(canvas)
                  if (candles.isEmpty()) return

                  val W  = width.toFloat()
                  val H  = height.toFloat()
                  val chartH = H * 0.76f          // main chart area height
                  val volTop = H * 0.80f           // volume panel top
                  val volH   = H * 0.14f           // volume panel height

                  // â”€â”€ Background grid â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                  for (i in 1..5) {
                      val gy = chartH * i / 6f
                      canvas.drawLine(0f, gy, W, gy, paintGrid)
                      canvas.drawLine(W * i / 6f, 0f, W * i / 6f, chartH, paintGrid)
                  }
                  canvas.drawLine(0f, volTop, W, volTop, paintGrid)

                  val maxP = candles.maxOf { it.high } + 1f
                  val minP = candles.minOf { it.low }  - 1f
                  val range = if (maxP == minP) 1f else maxP - minP

                  // Price axis labels
                  for (i in 0..3) {
                      val price = minP + range * (i / 3f)
                      val ly = chartH - chartH * (i / 3f) - 2f
                      canvas.drawText(String.format("%.1f", price), 4f, ly, paintLabel)
                  }

                  val spacing  = W / (candles.size + 1f)
                  val candleW  = (spacing * 0.55f).coerceAtLeast(4f)

                  val ema9  = calcEMA(9)
                  val ema21 = calcEMA(21)
                  val ema9Path  = Path(); val ema21Path = Path()
                  var ema9Started = false; var ema21Started = false

                  for (i in candles.indices) {
                      val c  = candles[i]
                      val cx = (i + 1f) * spacing

                      // Screen Y coordinates
                      fun toScreenY(price: Float) = chartH - ((price - minP) / range) * chartH

                      val openY  = toScreenY(c.open)
                      val closeY = toScreenY(c.close)
                      val highY  = toScreenY(c.high)
                      val lowY   = toScreenY(c.low)

                      val isGreen  = c.close >= c.open
                      val bodyTop  = minOf(openY, closeY)
                      val bodyBot  = maxOf(openY, closeY)
                      val bodyH    = maxOf(bodyBot - bodyTop, 2f)

                      // â”€â”€ Volume bar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                      val volBarH = volH * 0.75f
                      paintVol.color = if (isGreen) 0x7700E676.toInt() else 0x77FF1744.toInt()
                      canvas.drawRect(cx - candleW / 2f, volTop + volH - volBarH,
                          cx + candleW / 2f, volTop + volH, paintVol)

                      // â”€â”€ Wick â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                      val wp = if (isGreen) paintWickG else paintWickR
                      canvas.drawLine(cx, highY, cx, bodyTop, wp)
                      canvas.drawLine(cx, bodyBot, cx, lowY, wp)

                      // â”€â”€ Candle body with gradient â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                      val bodyShader = LinearGradient(
                          cx - candleW / 2f, bodyTop, cx + candleW / 2f, bodyTop + bodyH,
                          if (isGreen) 0xFF00FF88.toInt() else 0xFFFF4444.toInt(),
                          if (isGreen) 0xFF008844.toInt() else 0xFF990000.toInt(),
                          Shader.TileMode.CLAMP
                      )
                      val bodyPaint = Paint(Paint.ANTI_ALIAS_FLAG).apply {
                          shader = bodyShader; style = Paint.Style.FILL
                      }
                      canvas.drawRoundRect(
                          cx - candleW / 2f, bodyTop,
                          cx + candleW / 2f, bodyTop + bodyH,
                          3f, 3f, bodyPaint
                      )

                      // â”€â”€ EMA path points â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
                      val e9i  = i - (candles.size - ema9.size)
                      val e21i = i - (candles.size - ema21.size)
                      if (e9i in ema9.indices) {
                          val ey = toScreenY(ema9[e9i])
                          if (!ema9Started) { ema9Path.moveTo(cx, ey); ema9Started = true }
                          else ema9Path.lineTo(cx, ey)
                      }
                      if (e21i in ema21.indices) {
                          val ey = toScreenY(ema21[e21i])
                          if (!ema21Started) { ema21Path.moveTo(cx, ey); ema21Started = true }
                          else ema21Path.lineTo(cx, ey)
                      }
                  }

                  canvas.drawPath(ema21Path, paintEma21)
                  canvas.drawPath(ema9Path,  paintEma9)
              }
          }
          EOF

          # â”€â”€ 3. MainActivity.kt â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
