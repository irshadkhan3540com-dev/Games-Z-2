                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="vertical" android:background="#0D1F3D"
                      android:padding="12dp" android:layout_marginBottom="12dp">
                      <TextView android:id="@+id/tvTimer24hr" android:layout_width="wrap_content"
                          android:layout_height="wrap_content" android:text="24 Hour Cooldown: Ready"
                          android:textColor="#FFFFFF"/>
                      <Button android:id="@+id/btnClaim24hr" android:layout_width="match_parent"
                          android:layout_height="wrap_content" android:text="Start Timer (Get Rs.1000)"
