                  </LinearLayout>
              </LinearLayout>
              <TextView android:id="@+id/tvMahaulText" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:text="Mahaul Text Loading..."
                  android:textColor="#CFD8DC" android:gravity="center"
