Name: "Ultimate 3D Cinematic Tower & Trading Engine - FULL 3D REBUILD"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Setup Java 17 for Android"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "Step 3: Create Core Project Folders"
        run: |
          mkdir -p app/src/main/java/com/zatomic/tradinggame
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: "Step 4: Gradle Build System Configuration"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "TradingTowerUltimate"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false; id 'org.jetbrains.kotlin.android' version '1.9.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF

          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: "Step 5: App UI XMLs & Layouts"
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?><resources><color name="black">#000000</color><color name="white">#FFFFFF</color></resources>
          EOF
          
          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources><style name="Theme.TradingGame" parent="Theme.AppCompat.Light.NoActionBar"/></resources>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/ic_plus_circle.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="#FFD700" android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM17,13h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
          </vector>
          EOF

          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@android:color/black"/><foreground android:drawable="@drawable/ic_plus_circle"/></adaptive-icon>
          EOF

          # MAIN DASHBOARD - 3D World View
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#010811">

              <LinearLayout android:id="@+id/walletHeader"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:gravity="center_vertical"
                  android:layout_alignParentTop="true"
                  android:background="#CC050F1F" android:padding="12dp"
                  android:elevation="8dp">
                  <TextView android:id="@+id/tvWallet"
                      android:layout_width="0dp" android:layout_weight="1"
                      android:layout_height="wrap_content"
                      android:text="Balance: Rs.10000" android:textColor="#FFD700"
                      android:textSize="20sp" android:textStyle="bold"/>
                  <TextView android:id="@+id/tvTowerFloor"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Level 1" android:textColor="#00E5FF" android:textSize="14sp"
                      android:layout_marginEnd="12dp"/>
                  <ImageView android:id="@+id/btnOpenWalletSettings"
                      android:layout_width="30dp" android:layout_height="30dp"
