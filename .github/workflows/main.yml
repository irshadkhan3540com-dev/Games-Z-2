          package com.zatomic.tradinggame

          import android.content.Context
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*

          class WalletSettingsActivity : AppCompatActivity() {
              private lateinit var tvBalance: TextView
              private var balance = 10000
              private var towerFloor = 1
              private var job: Job? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_wallet_settings)

                  tvBalance = findViewById(R.id.tvCurrentBalance)
                  val prefs = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                  balance    = prefs.getInt("wallet_balance", 10000)
                  towerFloor = prefs.getInt("tower_floor", 1)
                  tvBalance.text = "Funds: Rs.$balance"

                  setupBtn(R.id.btnClaim1hr,  "t_1h",  3_600L,  100)
                  setupBtn(R.id.btnClaim3hr,  "t_3h",  10_800L, 300)
                  setupBtn(R.id.btnClaim24hr, "t_24h", 86_400L, 1000)

                  findViewById<Button>(R.id.btnBackToHome).setOnClickListener { finish() }

                  job = CoroutineScope(Dispatchers.Main).launch {
                      while (true) {
                          val now = System.currentTimeMillis()
                          updateLabel("t_1h",  now, R.id.tvTimer1hr,  R.id.btnClaim1hr,  "1 Hour",  100)
                          updateLabel("t_3h",  now, R.id.tvTimer3hr,  R.id.btnClaim3hr,  "3 Hour",  300)
                          updateLabel("t_24h", now, R.id.tvTimer24hr, R.id.btnClaim24hr, "24 Hour", 1000)
                          findViewById<TextView>(R.id.tvMahaulText).text =
                              "Mahaul: Level $towerFloor Island Tower â€” All Systems Secure"
                          delay(1_000)
                      }
                  }
              }

              private fun setupBtn(btnId: Int, key: String, secs: Long, prize: Int) {
                  findViewById<Button>(btnId).setOnClickListener {
                      val prefs = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                      val target = prefs.getLong(key, 0L)
                      val now = System.currentTimeMillis()
                      when {
                          target == 0L -> {
                              prefs.edit().putLong(key, now + secs * 1_000L).apply()
                              Toast.makeText(this, "Timer started!", Toast.LENGTH_SHORT).show()
                          }
                          now >= target -> {
                              balance += prize
                              prefs.edit().putLong(key, 0L).putInt("wallet_balance", balance).apply()
                              tvBalance.text = "Funds: Rs.$balance"
                              Toast.makeText(this, "Claimed Rs.$prize!", Toast.LENGTH_SHORT).show()
                          }
                          else -> Toast.makeText(this, "Timer still running!", Toast.LENGTH_SHORT).show()
                      }
                  }
              }

              private fun updateLabel(key: String, now: Long, tvId: Int, btnId: Int, name: String, prize: Int) {
                  val target = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).getLong(key, 0L)
                  val tv = findViewById<TextView>(tvId)
                  val btn = findViewById<Button>(btnId)
                  when {
                      target == 0L  -> { tv.text = "$name: Ready"; btn.text = "Start Timer (Get Rs.$prize)" }
                      now >= target -> { tv.text = "$name: Done!";  btn.text = "Claim Rs.$prize NOW!" }
                      else -> {
                          val diff = (target - now) / 1_000L
                          tv.text = String.format("%s: %02d:%02d:%02d left", name, diff / 3600, (diff % 3600) / 60, diff % 60)
                          btn.text = "LOCKED"
                      }
                  }
              }

              override fun onDestroy() { super.onDestroy(); job?.cancel() }
          }
          EOF

          # â”€â”€ 5. TradingActivity.kt â€” OHLC Engine + Rs.500 bet + result flash â”€â”€â”€â”€
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/TradingActivity.kt
          package com.zatomic.tradinggame

          import android.content.Context
          import android.graphics.Color
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*
          import java.util.Random

          class TradingActivity : AppCompatActivity() {

              private var bal = 10000
              private var bet = 10
              private var isTrade = false
              private var currentPrice = 514.85f
              private var openPrice = 514.85f

              private lateinit var tvBal: TextView
              private lateinit var tvPrice: TextView
              private lateinit var tvTimer: TextView
              private lateinit var graph: CustomGraphView

              private val rng = Random()
              private var tickerJob: Job? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_trading)

                  tvBal   = findViewById(R.id.tvTradingWallet)
                  tvPrice = findViewById(R.id.tvLivePrice)
                  tvTimer = findViewById(R.id.tvCountdown)
                  graph   = findViewById(R.id.customGraphView)

                  bal = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                      .getInt("wallet_balance", 10000)
                  tvBal.text = "Wallet: Rs.$bal"

                  // Bet amount buttons
                  listOf(
                      Pair(R.id.btnAmt10,  10),
                      Pair(R.id.btnAmt50,  50),
                      Pair(R.id.btnAmt100, 100),
                      Pair(R.id.btnAmt500, 500)
                  ).forEach { (id, amount) ->
                      findViewById<Button>(id).setOnClickListener { bet = amount }
                  }

                  // Trade buttons
                  findViewById<Button>(R.id.btnUp).setOnClickListener   { placeTrade("UP") }
                  findViewById<Button>(R.id.btnDown).setOnClickListener { placeTrade("DOWN") }

                  // OHLC candle generator â€” new candle every 1.4 s
                  tickerJob = CoroutineScope(Dispatchers.Main).launch {
                      while (true) {
                          val change = (rng.nextFloat() * 8f) - 4f
                          val closeP = (openPrice + change).coerceAtLeast(10f)
                          val highP  = maxOf(openPrice, closeP) + rng.nextFloat() * 2.5f
                          val lowP   = minOf(openPrice, closeP) - rng.nextFloat() * 2.5f

                          currentPrice = closeP
                          tvPrice.text = String.format("Rs.%.2f", currentPrice)
                          tvPrice.setTextColor(if (closeP >= openPrice) Color.GREEN else Color.RED)
                          graph.addCandle(openPrice, closeP, highP, lowP)

                          openPrice = closeP
                          delay(1_400)
                      }
                  }
              }

              private fun placeTrade(direction: String) {
                  if (isTrade) { Toast.makeText(this, "Trade in progress!", Toast.LENGTH_SHORT).show(); return }
                  if (bal < bet)  { Toast.makeText(this, "Insufficient balance!", Toast.LENGTH_SHORT).show(); return }

                  bal -= bet
                  tvBal.text = "Wallet: Rs.$bal"
                  isTrade = true
                  val entryPrice = currentPrice

                  CoroutineScope(Dispatchers.Main).launch {
                      for (i in 5 downTo 1) {
                          tvTimer.text = "Expiry: ${i}s"
                          delay(1_000)
                      }

                      val exitPrice = currentPrice
                      val won = when (direction) {
                          "UP"   -> exitPrice > entryPrice
                          "DOWN" -> exitPrice < entryPrice
                          else   -> false
                      }

                      if (won) {
                          bal += bet * 2
                          Toast.makeText(this@TradingActivity, "WIN! +Rs.${bet}", Toast.LENGTH_SHORT).show()
                          tvBal.setTextColor(Color.GREEN)
                      } else {
                          Toast.makeText(this@TradingActivity, "LOSS  -Rs.$bet", Toast.LENGTH_SHORT).show()
                          tvBal.setTextColor(Color.RED)
                      }

                      getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                          .edit().putInt("wallet_balance", bal).apply()
                      tvBal.text = "Wallet: Rs.$bal"

                      delay(800)
                      tvBal.setTextColor(Color.WHITE)
                      isTrade = false
                      tvTimer.text = "Clock: Standby"
                  }
              }

              override fun onDestroy() { super.onDestroy(); tickerJob?.cancel() }
          }
          EOF

