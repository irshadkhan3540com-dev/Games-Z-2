                      <TextView android:id="@+id/tvTimer1hr" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="1 Hour Cooldown: Ready" android:textColor="#FFFFFF"/>
                      <Button android:id="@+id/btnClaim1hr" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Start Timer (Get ₹100)" android:backgroundTint="#00E676" android:textColor="#000000" android:layout_marginTop="5dp"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:background="#0D1F3D" android:padding="12dp" android:layout_marginBottom="12dp">
                      <TextView android:id="@+id/tvTimer3hr" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="3 Hour Cooldown: Ready" android:textColor="#FFFFFF"/>
                      <Button android:id="@+id/btnClaim3hr" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Start Timer (Get ₹300)" android:backgroundTint="#FF9800" android:textColor="#FFFFFF" android:layout_marginTop="5dp"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:background="#0D1F3D" android:padding="12dp" android:layout_marginBottom="12dp">
                      <TextView android:id="@+id/tvTimer24hr" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="24 Hour Cooldown: Ready" android:textColor="#FFFFFF"/>
                      <Button android:id="@+id/btnClaim24hr" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Start Timer (Get ₹1000)" android:backgroundTint="#E91E63" android:textColor="#FFFFFF" android:layout_marginTop="5dp"/>
                  </LinearLayout>
              </LinearLayout>
              <TextView android:id="@+id/tvMahaulText" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Mahaul Text Loading..." android:textColor="#CFD8DC" android:gravity="center" android:layout_above="@+id/btnBackToHome" android:layout_marginBottom="15dp" android:textStyle="bold"/>
              <Button android:id="@+id/btnBackToHome" android:layout_width="match_parent" android:layout_height="50dp" android:text="CLOSE VAULT AND RETURN" android:backgroundTint="#78909C" android:textColor="#000000" android:layout_alignParentBottom="true"/>
          </RelativeLayout>
          EOF

          # TRADING ARENA - UPGRADED TO MATCH IMAGE (PRO CANDLESTICK UI)
          cat << 'EOF' > app/src/main/res/layout/activity_trading.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#090E17" android:padding="16dp">
              
              <!-- Pro Trading Info Header (Like Image 1) -->
              <LinearLayout android:id="@+id/headerPro" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:weightSum="2">
                      <TextView android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="SPY  5m" android:textColor="#00FF00" android:textSize="20sp" android:textStyle="bold"/>
                      <TextView android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="LIVE EST" android:textColor="#FFEB3B" android:textSize="16sp" android:gravity="end"/>
                  </LinearLayout>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="SPDR S&amp;P 500 ETF" android:textColor="#B0BEC5" android:textSize="12sp"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="4dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="EMA 21" android:textColor="#FFC107" android:textSize="12sp" android:textStyle="bold" android:layout_marginEnd="8dp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="EMA 9" android:textColor="#03A9F4" android:textSize="12sp" android:textStyle="bold"/>
                  </LinearLayout>
              </LinearLayout>

              <TextView android:id="@+id/tvLivePrice" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="₹100.00" android:textColor="#00FF00" android:textSize="28sp" android:textStyle="bold" android:layout_below="@id/headerPro" android:layout_alignParentRight="true" android:layout_marginTop="10dp" android:background="#1A00FF00" android:padding="4dp"/>
              
              <!-- Upgraded Candlestick Graph View -->
              <com.zatomic.tradinggame.CustomGraphView android:id="@+id/customGraphView" android:layout_width="match_parent" android:layout_height="320dp" android:layout_below="@id/tvLivePrice" android:layout_marginTop="10dp" android:background="#050A11"/>
              
              <TextView android:id="@+id/tvTradingWallet" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Wallet: ₹10000" android:textColor="#FFFFFF" android:textSize="16sp" android:layout_above="@+id/betAmountLayout" android:layout_marginBottom="10dp"/>
              <TextView android:id="@+id/tvCountdown" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Clock: Standby" android:textColor="#FFEB3B" android:layout_above="@+id/betAmountLayout" android:layout_alignParentRight="true" android:layout_marginBottom="10dp"/>
              
              <LinearLayout android:id="@+id/betAmountLayout" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:weightSum="3" android:layout_above="@+id/btnLayout" android:layout_marginBottom="15dp">
                  <Button android:id="@+id/btnAmt10" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="₹10" android:backgroundTint="#1E293B"/>
                  <Button android:id="@+id/btnAmt50" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="₹50" android:backgroundTint="#1E293B" android:layout_marginStart="5dp" android:layout_marginEnd="5dp"/>
                  <Button android:id="@+id/btnAmt100" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="₹100" android:backgroundTint="#1E293B"/>
              </LinearLayout>
              
              <LinearLayout android:id="@+id/btnLayout" android:layout_width="match_parent" android:layout_height="60dp" android:orientation="horizontal" android:weightSum="2" android:layout_alignParentBottom="true">
                  <Button android:id="@+id/btnUp" android:layout_width="0dp" android:layout_weight="1" android:layout_height="match_parent" android:text="CALL (UP) 🟢" android:backgroundTint="#00C853" android:textSize="16sp" android:textStyle="bold"/>
                  <Button android:id="@+id/btnDown" android:layout_width="0dp" android:layout_weight="1" android:layout_height="match_parent" android:text="PUT (DOWN) 🔴" android:backgroundTint="#D50000" android:layout_marginStart="10dp" android:textSize="16sp" android:textStyle="bold"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

      - name: "Step 6: Core Engine Logic & 15-Sec Animation System"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.zatomic.tradinggame'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.tradinggame'
                  minSdk 26
                  targetSdk 34
                  versionCode 8
                  versionName "8.0-Ultimate-Fish-Edition"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          # 1. 3D ISLAND ENGINE - NO CHANGES REMOVED
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/CinematicWorldView.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.graphics.*
          import android.util.AttributeSet
          import android.view.MotionEvent
          import android.view.View
          import kotlin.math.sin

          class CinematicWorldView(context: Context, attrs: AttributeSet? = null) : View(context, attrs) {
              var floorCount = 1
              private var rotationAngle = 0f
              private var previousX = 0f

              // 15-Second Fish Animation Logic
              private var fishTimeProgress = 0f
              private val animationDuration = 100f
              private var isFishFlying = false
              private var lastJumpTime = System.currentTimeMillis()

              private val paintSky = Paint().apply { isAntiAlias = true }
              private val paintWater = Paint().apply { color = Color.parseColor("#0F4B99"); style = Paint.Style.FILL; isAntiAlias = true }
              private val paintIsland = Paint().apply { color = Color.parseColor("#2E7D32"); style = Paint.Style.FILL; isAntiAlias = true }
              private val paintFish = Paint().apply { color = Color.parseColor("#FF9800"); style = Paint.Style.FILL; isAntiAlias = true }

              override fun onTouchEvent(event: MotionEvent): Boolean {
                  val x = event.x
                  if (event.action == MotionEvent.ACTION_MOVE) {
                      rotationAngle += (x - previousX) * 0.5f
                      invalidate()
                  }
                  previousX = x
                  return true
              }

              override fun onDraw(canvas: Canvas) {
                  super.onDraw(canvas)
                  val cx = width / 2f
                  val cy = height / 2f + 150f

                  val skyGrad = LinearGradient(0f, 0f, 0f, height.toFloat(), Color.parseColor("#051024"), Color.parseColor("#1B2A4A"), Shader.TileMode.CLAMP)
                  paintSky.shader = skyGrad
                  canvas.drawRect(0f, 0f, width.toFloat(), height.toFloat(), paintSky)
                  canvas.drawRect(0f, cy, width.toFloat(), height.toFloat(), paintWater)
                  canvas.drawOval(cx - 280f, cy - 80f, cx + 280f, cy + 80f, paintIsland)

                  val towerWidth = 100f
                  val floorHeight = 40f
                  for (i in 0 until floorCount) {
                      val bottomY = cy - 20f - (i * floorHeight)
                      val topY = bottomY - floorHeight
                      val rect = RectF(cx - towerWidth / 2f, topY, cx + towerWidth / 2f, bottomY)

                      val pTower = Paint().apply {
                          color = when (i % 4) {
                              0 -> Color.parseColor("#00E5FF")
                              1 -> Color.parseColor("#FFD700")
                              2 -> Color.parseColor("#00E676")
                              else -> Color.parseColor("#E91E63")
                          }
                          style = Paint.Style.FILL
                          isAntiAlias = true
                      }
                      canvas.drawRect(rect, pTower)
                      val pShadow = Paint().apply { color = Color.parseColor("#44000000"); style = Paint.Style.FILL }
                      canvas.drawRect(cx, topY, cx + towerWidth / 2f, bottomY, pShadow)
                  }

                  val now = System.currentTimeMillis()
                  if (!isFishFlying && now - lastJumpTime > 15000) {
                      isFishFlying = true
                      fishTimeProgress = 0f
                  }

                  if (isFishFlying) {
                      fishTimeProgress += 1.5f
                      if (fishTimeProgress > animationDuration) {
                          isFishFlying = false
                          lastJumpTime = System.currentTimeMillis()
                      } else {
                          val normTime = fishTimeProgress / animationDuration
                          val fishX = (normTime * (width + 300f)) - 150f
                          val towerTopY = cy - 20f - (floorCount * floorHeight)
                          val clearance = 100f
                          val peakY = towerTopY - clearance
                          val heightDelta = cy - peakY
                          val fishY = cy - (sin(normTime * Math.PI) * heightDelta).toFloat()

                          canvas.drawOval(fishX - 30f, fishY - 15f, fishX + 30f, fishY + 15f, paintFish)
                          val tail = Path().apply {
                              moveTo(fishX - 25f, fishY)
                              lineTo(fishX - 50f, fishY - 20f)
                              lineTo(fishX - 50f, fishY + 20f)
                              close()
                          }
                          canvas.drawPath(tail, paintFish)
                      }
                  }
                  invalidate()
              }
          }
          EOF

          # 2. UPGRADED CUSTOM GRAPH VIEW - CANDLESTICK & GRID PATTERNS
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/CustomGraphView.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.graphics.*
          import android.util.AttributeSet
          import android.view.View

          class CustomGraphView(context: Context, attrs: AttributeSet? = null) : View(context, attrs) {
              data class Candle(val open: Float, val close: Float, val high: Float, val low: Float)
              private val candles = mutableListOf<Candle>()
              
              private val paintGreen = Paint().apply { color = Color.parseColor("#00FF00"); style = Paint.Style.FILL; isAntiAlias = true }
              private val paintRed = Paint().apply { color = Color.parseColor("#FF0000"); style = Paint.Style.FILL; isAntiAlias = true }
              private val paintWickGreen = Paint().apply { color = Color.parseColor("#00FF00"); strokeWidth = 3f; isAntiAlias = true }
              private val paintWickRed = Paint().apply { color = Color.parseColor("#FF0000"); strokeWidth = 3f; isAntiAlias = true }
              
              private val paintGrid = Paint().apply { color = Color.parseColor("#1AFFFFFF"); strokeWidth = 1f }
              private val paintEma21 = Paint().apply { color = Color.parseColor("#FFC107"); strokeWidth = 3f; style = Paint.Style.STROKE; isAntiAlias = true }
              private val paintEma9 = Paint().apply { color = Color.parseColor("#03A9F4"); strokeWidth = 3f; style = Paint.Style.STROKE; isAntiAlias = true }

              fun addCandle(open: Float, close: Float, high: Float, low: Float) {
                  if (candles.size > 28) candles.removeAt(0)
                  candles.add(Candle(open, close, high, low))
                  invalidate()
              }

              override fun onDraw(canvas: Canvas) {
                  super.onDraw(canvas)
                  // Draw Trading Grid Background
                  for (i in 1..6) {
                      canvas.drawLine(0f, height * (i/6f), width.toFloat(), height * (i/6f), paintGrid)
                      canvas.drawLine(width * (i/6f), 0f, width * (i/6f), height.toFloat(), paintGrid)
                  }

                  if (candles.isEmpty()) return
                  
                  val maxP = candles.maxOf { it.high } + 2f
                  val minP = candles.minOf { it.low } - 2f
                  val range = if (maxP == minP) 1f else (maxP - minP)
                  
                  val candleW = width.toFloat() / 32f
                  val spacing = width.toFloat() / 29f
                  
                  val pathEma21 = Path()
                  val pathEma9 = Path()

                  for (i in candles.indices) {
                      val c = candles[i]
                      val cx = i * spacing + candleW
                      
                      val topY = height - (((maxOf(c.open, c.close) - minP) / range) * height)
                      val bottomY = height - (((minOf(c.open, c.close) - minP) / range) * height)
                      val highY = height - (((c.high - minP) / range) * height)
                      val lowY = height - (((c.low - minP) / range) * height)
                      
                      val isGreen = c.close >= c.open
                      val pBody = if (isGreen) paintGreen else paintRed
                      val pWick = if (isGreen) paintWickGreen else paintWickRed
                      
                      // Draw High/Low Wick
                      canvas.drawLine(cx, highY, cx, lowY, pWick)
                      
                      // Draw Candle Body (Hammer/Engulfing physics)
                      val bodyHeight = maxOf(2f, bottomY - topY) // Minimum body height
                      canvas.drawRect(cx - candleW/2, topY, cx + candleW/2, topY + bodyHeight, pBody)
                      
                      // Draw EMA Lines over the chart
                      val midY = (topY + bottomY) / 2
                      if (i == 0) {
                          pathEma21.moveTo(cx, midY + 15f)
                          pathEma9.moveTo(cx, midY - 10f)
                      } else {
                          pathEma21.lineTo(cx, midY + 15f)
                          pathEma9.lineTo(cx, midY - 10f)
                      }
                  }
                  canvas.drawPath(pathEma21, paintEma21)
                  canvas.drawPath(pathEma9, paintEma9)
              }
          }
          EOF

          # 3. MAIN ACTIVITY - NO CHANGES REMOVED
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/MainActivity.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.content.Intent
          import android.os.Bundle
          import android.widget.Button
          import android.widget.ImageView
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              private lateinit var tvWallet: TextView
              private lateinit var tvTowerFloor: TextView
              private lateinit var worldView: CinematicWorldView
              private var balance = 10000
              private var towerFloor = 1

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  tvWallet = findViewById(R.id.tvWallet)
                  tvTowerFloor = findViewById(R.id.tvTowerFloor)
                  worldView = findViewById(R.id.cinematicWorldView)

                  findViewById<ImageView>(R.id.btnOpenWalletSettings).setOnClickListener {
                      startActivity(Intent(this, WalletSettingsActivity::class.java))
                  }

                  findViewById<Button>(R.id.btnUpgradeTower).setOnClickListener {
                      val cost = towerFloor * 500
                      if (balance < cost) {
                          Toast.makeText(this, "Need ₹$cost to construct next floor!", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }
                      balance -= cost
                      towerFloor++
                      getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).edit()
                          .putInt("wallet_balance", balance)
                          .putInt("tower_floor", towerFloor).apply()
                      syncUI()
                  }

                  findViewById<Button>(R.id.btnOpenMarket).setOnClickListener {
                      startActivity(Intent(this, TradingActivity::class.java))
                  }
              }

              override fun onResume() {
                  super.onResume()
                  val prefs = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                  balance = prefs.getInt("wallet_balance", 10000)
                  towerFloor = prefs.getInt("tower_floor", 1)
                  syncUI()
              }

              private fun syncUI() {
                  tvWallet.text = "Balance: ₹$balance"
                  tvTowerFloor.text = "Island Tower: Level $towerFloor"
                  findViewById<Button>(R.id.btnUpgradeTower).text = "Build Floor ${towerFloor + 1} (Cost: ₹${towerFloor * 500})"
                  worldView.floorCount = towerFloor
                  worldView.invalidate()
              }
          }
          EOF

          # 4. WALLET SETTINGS ACTIVITY - NO CHANGES REMOVED
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/WalletSettingsActivity.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*

          class WalletSettingsActivity : AppCompatActivity() {
              private lateinit var tvBalance: TextView
              private var balance = 10000
              private var towerFloor = 1
              private var job: Job? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_wallet_settings)
                  
                  tvBalance = findViewById(R.id.tvCurrentBalance)
                  val prefs = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                  balance = prefs.getInt("wallet_balance", 10000)
                  towerFloor = prefs.getInt("tower_floor", 1)
                  tvBalance.text = "Funds: ₹$balance"

                  setupBtn(R.id.btnClaim1hr, "t_1h", 3600, 100)
                  setupBtn(R.id.btnClaim3hr, "t_3h", 10800, 300)
                  setupBtn(R.id.btnClaim24hr, "t_24h", 86400, 1000)

                  findViewById<Button>(R.id.btnBackToHome).setOnClickListener { finish() }

                  job = CoroutineScope(Dispatchers.Main).launch {
                      while(true) {
                          val now = System.currentTimeMillis()
                          updateLabel("t_1h", now, findViewById(R.id.tvTimer1hr), findViewById(R.id.btnClaim1hr), "1 Hour", 100)
                          updateLabel("t_3h", now, findViewById(R.id.tvTimer3hr), findViewById(R.id.btnClaim3hr), "3 Hour", 300)
                          updateLabel("t_24h", now, findViewById(R.id.tvTimer24hr), findViewById(R.id.btnClaim24hr), "24 Hour", 1000)
                          findViewById<TextView>(R.id.tvMahaulText).text = "Mahaul Status: Level $towerFloor Tower is Safe."
                          delay(1000)
                      }
                  }
              }

              private fun setupBtn(id: Int, key: String, secs: Long, prize: Int) {
                  findViewById<Button>(id).setOnClickListener {
                      val prefs = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE)
                      val target = prefs.getLong(key, 0L)
                      val now = System.currentTimeMillis()
                      if (target == 0L) {
                          prefs.edit().putLong(key, now + (secs * 1000)).apply()
                          Toast.makeText(this, "Timer Started!", Toast.LENGTH_SHORT).show()
                      } else if (now >= target) {
                          balance += prize
                          prefs.edit().putLong(key, 0L).putInt("wallet_balance", balance).apply()
                          tvBalance.text = "Funds: ₹$balance"
                          Toast.makeText(this, "Claimed ₹$prize!", Toast.LENGTH_SHORT).show()
                      }
                  }
              }

              private fun updateLabel(key: String, now: Long, tv: TextView, btn: Button, name: String, p: Int) {
                  val target = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).getLong(key, 0L)
                  if (target == 0L) {
                      tv.text = "$name: Ready"; btn.text = "Start Timer (Get ₹$p)"
                  } else if (now >= target) {
                      tv.text = "$name: Finished!"; btn.text = "Claim ₹$p NOW!"
                  } else {
                      val diff = (target - now) / 1000
                      tv.text = String.format("%s: %02d:%02d:%02d left", name, diff / 3600, (diff % 3600) / 60, diff % 60)
                      btn.text = "LOCKED"
                  }
              }

              override fun onDestroy() { super.onDestroy(); job?.cancel() }
          }
          EOF

          # 5. TRADING ACTIVITY - UPGRADED O.C.H.L CANDLE GENERATION
          cat << 'EOF' > app/src/main/java/com/zatomic/tradinggame/TradingActivity.kt
          package com.zatomic.tradinggame
          import android.content.Context
          import android.graphics.Color
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*
          import java.util.Random

          class TradingActivity : AppCompatActivity() {
              private var bal = 10000; private var bet = 10; private var isTrade = false
              private var currentPrice = 514.85f // Matching image 1 start price
              private lateinit var tvBal: TextView; private lateinit var tvP: TextView; private lateinit var tvT: TextView
              private lateinit var g: CustomGraphView; private var job: Job? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_trading)
                  tvBal = findViewById(R.id.tvTradingWallet); tvP = findViewById(R.id.tvLivePrice)
                  tvT = findViewById(R.id.tvCountdown); g = findViewById(R.id.customGraphView)
                  
                  bal = getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).getInt("wallet_balance", 10000)
                  tvBal.text = "Wallet: ₹$bal"

                  findViewById<Button>(R.id.btnAmt10).setOnClickListener { bet = 10 }
                  findViewById<Button>(R.id.btnAmt50).setOnClickListener { bet = 50 }
                  findViewById<Button>(R.id.btnAmt100).setOnClickListener { bet = 100 }

                  // Candlestick Pattern Generator Engine
                  job = CoroutineScope(Dispatchers.Main).launch {
                      var openPrice = currentPrice
                      while(true) {
                          val change = (Random().nextFloat() * 6f) - 3f // Random market fluctuation
                          val closePrice = openPrice + change
                          val highPrice = maxOf(openPrice, closePrice) + (Random().nextFloat() * 2f)
                          val lowPrice = minOf(openPrice, closePrice) - (Random().nextFloat() * 2f)
                          
                          currentPrice = closePrice
                          tvP.text = String.format("₹%.2f", currentPrice)
                          tvP.setTextColor(if(closePrice >= openPrice) Color.GREEN else Color.RED)
                          
                          g.addCandle(openPrice, closePrice, highPrice, lowPrice)
                          openPrice = closePrice // Next candle opens at current close
                          delay(1200) // Update every 1.2 seconds for realistic feel
                      }
                  }

                  findViewById<Button>(R.id.btnUp).setOnClickListener { trade("UP") }
                  findViewById<Button>(R.id.btnDown).setOnClickListener { trade("DOWN") }
              }

              private fun trade(type: String) {
                  if (isTrade || bal < bet) return
                  bal -= bet; tvBal.text = "Wallet: ₹$bal"; isTrade = true
                  val sp = currentPrice
                  CoroutineScope(Dispatchers.Main).launch {
                      for(i in 5 downTo 1) { tvT.text = "Expiry: ${i}s"; delay(1000) }
                      if((type=="UP" && currentPrice>sp) || (type=="DOWN" && currentPrice<sp)) { 
                          bal += bet*2; Toast.makeText(this@TradingActivity, "PROFIT WIN!", Toast.LENGTH_SHORT).show() 
                      } else {
                          Toast.makeText(this@TradingActivity, "LOSS!", Toast.LENGTH_SHORT).show() 
                      }
                      getSharedPreferences("TradingGamePrefs", Context.MODE_PRIVATE).edit().putInt("wallet_balance", bal).apply()
                      tvBal.text = "Wallet: ₹$bal"; isTrade = false; tvT.text = "Clock: Standby"
                  }
              }
              override fun onDestroy() { super.onDestroy(); job?.cancel() }
          }
          EOF

