                  android:textStyle="bold"/>
              <Button android:id="@+id/btnBackToHome" android:layout_width="match_parent"
                  android:layout_height="50dp" android:text="CLOSE VAULT AND RETURN"
                  android:backgroundTint="#78909C" android:textColor="#000000"
                  android:layout_alignParentBottom="true"/>
          </RelativeLayout>
          EOF

          # TRADING ARENA - PRO CANDLESTICK UI
          cat << 'EOF' > app/src/main/res/layout/activity_trading.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#060D18" android:padding="14dp">
              <LinearLayout android:id="@+id/headerPro"
