name: "Ultimate 3D Cinematic Tower & Trading Engine"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Setup Java 17 for Android"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "Step 3: Create Core Project Folders"
        run: |
          mkdir -p app/src/main/java/com/zatomic/tradinggame
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: "Step 4: Gradle Build System Configuration"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "TradingTowerUltimate"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false; id 'org.jetbrains.kotlin.android' version '1.9.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF
          
          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: "Step 5: App UI XMLs & Layouts"
        run: |
          # Colors and Themes
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?><resources><color name="black">#000000</color><color name="white">#FFFFFF</color></resources>
          EOF
          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources><style name="Theme.TradingGame" parent="Theme.AppCompat.Light.NoActionBar"/></resources>
          EOF

          # Icons
          cat << 'EOF' > app/src/main/res/drawable/ic_plus_circle.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="#FFD700" android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM17,13h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
          </vector>
          EOF
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@android:color/black"/><foreground android:drawable="@drawable/ic_plus_circle"/></adaptive-icon>
          EOF

          # MAIN DASHBOARD (Cinematic View) - NO CHANGES REMOVED
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#020813">
              <LinearLayout android:id="@+id/walletHeader" android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center_vertical" android:layout_alignParentTop="true" android:layout_centerHorizontal="true" android:background="#0D1F3D" android:padding="12dp" android:layout_marginTop="16dp" android:elevation="5dp">
                  <TextView android:id="@+id/tvWallet" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Balance: ₹10000" android:textColor="#FFD700" android:textSize="20sp" android:textStyle="bold"/>
                  <ImageView android:id="@+id/btnOpenWalletSettings" android:layout_width="26dp" android:layout_height="26dp" android:src="@drawable/ic_plus_circle" android:layout_marginStart="10dp"/>
              </LinearLayout>
              <TextView android:id="@+id/tvTowerFloor" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Island Tower: Level 1" android:textColor="#00E5FF" android:textSize="15sp" android:layout_below="@id/walletHeader" android:layout_centerHorizontal="true" android:layout_marginTop="6dp"/>
              
              <com.zatomic.tradinggame.CinematicWorldView android:id="@+id/cinematicWorldView" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/tvTowerFloor" android:layout_above="@+id/controlBase"/>

              <LinearLayout android:id="@+id/controlBase" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_alignParentBottom="true" android:padding="12dp" android:background="#99000000">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Touch and Swipe: Rotate Island | Fish jumps every 15s" android:textColor="#A0AAB5" android:textSize="12sp" android:layout_gravity="center" android:layout_marginBottom="6dp"/>
                  <Button android:id="@+id/btnUpgradeTower" android:layout_width="match_parent" android:layout_height="50dp" android:text="Build New Floor Level" android:backgroundTint="#FF9800" android:textColor="#FFFFFF" android:layout_marginBottom="6dp"/>
                  <Button android:id="@+id/btnOpenMarket" android:layout_width="match_parent" android:layout_height="60dp" android:text="ENTER SECURE TRADING ZONE" android:textSize="15sp" android:textStyle="bold" android:backgroundTint="#00E676" android:textColor="#000000"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # OFFLINE TIME CLAIM HUB - NO CHANGES REMOVED
          cat << 'EOF' > app/src/main/res/layout/activity_wallet_settings.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#020813" android:padding="16dp">
              <TextView android:id="@+id/tvTitle" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="OFFLINE TIME CLAIM HUB" android:textColor="#00E5FF" android:textSize="22sp" android:textStyle="bold" android:layout_centerHorizontal="true" android:layout_marginTop="10dp"/>
              <TextView android:id="@+id/tvCurrentBalance" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Funds: ₹10000" android:textColor="#FFD700" android:textSize="18sp" android:layout_below="@id/tvTitle" android:layout_centerHorizontal="true" android:layout_marginTop="5dp"/>
              
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_below="@id/tvCurrentBalance" android:layout_marginTop="25dp">
