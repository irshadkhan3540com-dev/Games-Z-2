                  android:layout_width="match_parent" android:layout_height="match_parent"
                  android:layout_below="@id/walletHeader"
                  android:layout_above="@+id/controlBase"/>

              <LinearLayout android:id="@+id/controlBase"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="vertical" android:layout_alignParentBottom="true"
                  android:padding="14dp" android:background="#DD010811" android:elevation="8dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Swipe to Rotate 3D Island  |  Giant Whale jumps every 15s"
                      android:textColor="#7090B0" android:textSize="11sp"
